<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Benson Phuah — web developer &amp; builder. Tap to save my contact, message me, or find my links.">
  <meta name="theme-color" content="#0A0A0B">

  <!-- Social preview -->
  <meta property="og:title" content="Benson Phuah — Digital Card">
  <meta property="og:description" content="Web developer &amp; builder. Save my contact or say hi in one tap.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Benson Phuah">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Benson Phuah — Digital Card</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; background-color: #0A0A0B; }
    /* Dark pre-paint screen so there's no white flash before Flutter loads. */
    #boot {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0A0A0B; z-index: 9999; transition: opacity .3s ease;
    }
    #boot .dot {
      width: 34px; height: 34px; border-radius: 50%;
      border: 2px solid #1E1E22; border-top-color: #2CCB7C;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="boot"><div class="dot"></div></div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var boot = document.getElementById('boot');
      if (boot) { boot.style.opacity = '0'; setTimeout(function () { boot.remove(); }, 350); }
    });
  </script>
</body>
</html>
