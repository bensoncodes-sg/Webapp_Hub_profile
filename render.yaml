# Render Blueprint — deploys the card as a static site.
# In Render: New > Blueprint, point it at this repo, and it reads this file.
services:
  - type: web
    name: benson-nfc-card
    runtime: static
    buildCommand: bash ./build.sh
    staticPublishPath: build/web
    pullRequestPreviewsEnabled: false
    # SPA fallback: any route Flutter owns falls back to index.html.
    # Real files (benson.vcf, assets, main.dart.js) are served directly and
    # are NOT affected by this rewrite.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
